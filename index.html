<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container d-flex flex-column align-items-center">
      <h1 class="mt-5 text-center fw-bold display-4 border-bottom pb-2">📝 Todo App</h1>

      <div class="container justify-content-center d-flex gap-2 mb-3 mt-3">
        <input
          id="input"
          class="form-control-md"
          placeholder="Skriv något..."
        />
        <button id="addBtn" class="btn btn-primary">Lägg till</button>
        <button id="removeBtn" class="btn btn-danger">Ta bort alla</button>
      </div>

      <ul id="list"></ul>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
